<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f2010"/>
      <stop offset="100%" stop-color="#1a3d1a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#25671E"/>
      <stop offset="100%" stop-color="#48A111"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#F2B50B"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gauge-ring" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#48A111"/>
      <stop offset="100%" stop-color="#F2B50B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="card-clip">
      <rect width="420" height="360" rx="20"/>
    </clipPath>
  </defs>

  <!-- Main dashboard card -->
  <g transform="translate(90, 50)" filter="url(#shadow)">
    <!-- Card background -->
    <rect width="420" height="360" rx="20" fill="#0a1a0a"/>
    <rect width="420" height="360" rx="20" fill="url(#card-bg)" opacity="0.85"/>
    <!-- Card border -->
    <rect width="420" height="360" rx="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Grid pattern inside card -->
    <clipPath id="card-clip"><rect width="420" height="360" rx="20"/></clipPath>
    <g clip-path="url(#card-clip)">
      <path d="M0 40h420M0 80h420M0 120h420M0 160h420M0 200h420M0 240h420M0 280h420M0 320h420M0 360h420M42 0v360M84 0v360M126 0v360M168 0v360M210 0v360M252 0v360M294 0v360M336 0v360M378 0v360M420 0v360" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </g>

    <!-- Browser chrome -->
    <rect width="420" height="44" rx="20" fill="rgba(255,255,255,0.04)"/>
    <rect x="0" y="22" width="420" height="22" fill="rgba(255,255,255,0.04)"/>
    <circle cx="18" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
    <circle cx="34" cy="22" r="5" fill="#F2B50B" opacity="0.7"/>
    <circle cx="50" cy="22" r="5" fill="#48A111" opacity="0.7"/>
    <text x="210" y="27" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" font-weight="500">NovaChem Quality Intelligence™</text>

    <!-- Section header -->
    <text x="24" y="72" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" font-weight="500" letter-spacing="1">QUALITY DASHBOARD</text>
    <circle cx="390" cy="66" r="5" fill="#48A111" opacity="0.8"/>
    <circle cx="390" cy="66" r="5" fill="#48A111">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="378" y="70" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#48A111" font-weight="600">LIVE</text>

    <!-- Purity gauge area -->
    <!-- Circular gauge background -->
    <circle cx="82" cy="140" r="48" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
    <!-- Gauge progress arc (about 220deg = 99.8%) -->
    <circle cx="82" cy="140" r="48" fill="none" stroke="url(#gauge-ring)" stroke-width="8" stroke-linecap="round" stroke-dasharray="290 40" transform="rotate(-220 82 140)"/>
    <!-- Gauge center text -->
    <text x="82" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ffffff" font-weight="800">99.8</text>
    <text x="82" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" font-weight="500">PURITY %</text>

    <!-- Product info right of gauge -->
    <text x="152" y="118" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="700">H₂SO₄ — Grade A</text>
    <text x="152" y="135" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">Industrial Grade Sulfuric Acid</text>
    <rect x="152" y="145" width="60" height="18" rx="5" fill="rgba(72,161,17,0.2)" stroke="#48A111" stroke-width="1" stroke-opacity="0.5"/>
    <text x="182" y="157" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6bce2a" font-weight="600">ISO Certified</text>
    <rect x="218" y="145" width="52" height="18" rx="5" fill="rgba(242,181,11,0.15)" stroke="#F2B50B" stroke-width="1" stroke-opacity="0.4"/>
    <text x="244" y="157" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#F2B50B" font-weight="600">REACH ✓</text>

    <!-- Metric chips -->
    <rect x="152" y="168" width="60" height="32" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="182" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#48A111" font-weight="800">1,240</text>
    <text x="182" y="193" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Batches QC'd</text>

    <rect x="220" y="168" width="60" height="32" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="250" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#F2B50B" font-weight="800">100%</text>
    <text x="250" y="193" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Pass Rate</text>

    <rect x="286" y="168" width="60" height="32" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="316" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#60a5fa" font-weight="800">45+</text>
    <text x="316" y="193" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">Countries</text>

    <!-- Divider -->
    <line x1="24" y1="210" x2="396" y2="210" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Bar chart section -->
    <text x="24" y="232" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" font-weight="500">MONTHLY PRODUCTION VOLUME (MT)</text>

    <!-- Chart bars -->
    <!-- Jan-Dec -->
    <rect x="30" y="292" width="22" height="40" rx="4" fill="url(#bar1)" opacity="0.75"/>
    <rect x="60" y="278" width="22" height="54" rx="4" fill="url(#bar1)" opacity="0.8"/>
    <rect x="90" y="261" width="22" height="71" rx="4" fill="url(#bar1)" opacity="0.85"/>
    <rect x="120" y="275" width="22" height="57" rx="4" fill="url(#bar2)" opacity="0.8"/>
    <rect x="150" y="252" width="22" height="80" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="180" y="262" width="22" height="70" rx="4" fill="url(#bar2)" opacity="0.8"/>
    <rect x="210" y="243" width="22" height="89" rx="4" fill="url(#bar1)"/>
    <rect x="240" y="253" width="22" height="79" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <rect x="270" y="247" width="22" height="85" rx="4" fill="url(#bar1)" opacity="0.95"/>
    <rect x="300" y="258" width="22" height="74" rx="4" fill="url(#bar1)" opacity="0.85"/>
    <rect x="330" y="249" width="22" height="83" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <rect x="360" y="242" width="22" height="90" rx="4" fill="url(#bar1)"/>

    <!-- X axis labels -->
    <text x="41" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">J</text>
    <text x="71" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">F</text>
    <text x="101" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">M</text>
    <text x="131" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">A</text>
    <text x="161" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">M</text>
    <text x="191" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">J</text>
    <text x="221" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">J</text>
    <text x="251" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">A</text>
    <text x="281" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">S</text>
    <text x="311" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">O</text>
    <text x="341" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">N</text>
    <text x="371" y="342" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">D</text>

    <!-- Horizontal guide lines -->
    <line x1="24" y1="332" x2="396" y2="332" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="24" y1="295" x2="396" y2="295" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="24" y1="258" x2="396" y2="258" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Floating ISO badge card (top right) -->
  <g transform="translate(448, 30)">
    <rect width="120" height="70" rx="14" fill="#F2B50B" filter="url(#shadow)"/>
    <text x="60" y="26" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1a4d15" font-weight="700" letter-spacing="1">CERTIFIED</text>
    <text x="60" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#1a4d15" font-weight="900">ISO</text>
    <text x="60" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1a4d15" font-weight="700" opacity="0.8">9001:2015</text>
  </g>

  <!-- Floating client count card (bottom left) -->
  <g transform="translate(20, 360)">
    <rect width="130" height="65" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="18" y="24" font-family="system-ui,sans-serif" font-size="9" fill="#64748b" font-weight="600" letter-spacing="0.5">TRUSTED BY</text>
    <text x="18" y="47" font-family="system-ui,sans-serif" font-size="22" fill="#25671E" font-weight="900">2,500+</text>
    <text x="18" y="60" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" font-weight="500">Global Clients</text>
  </g>

  <!-- Floating delivery card (bottom right) -->
  <g transform="translate(450, 370)">
    <rect width="120" height="65" rx="14" fill="#0a1a0a" stroke="rgba(72,161,17,0.3)" stroke-width="1" filter="url(#shadow)"/>
    <circle cx="18" cy="20" r="6" fill="#48A111" opacity="0.9"/>
    <text x="30" y="24" font-family="system-ui,sans-serif" font-size="9" fill="#48A111" font-weight="700">ON-TIME</text>
    <text x="12" y="45" font-family="system-ui,sans-serif" font-size="18" fill="#ffffff" font-weight="900">98.7%</text>
    <text x="12" y="58" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Delivery Rate</text>
  </g>
</svg>
