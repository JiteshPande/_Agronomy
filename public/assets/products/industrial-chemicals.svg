<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="bg-ind" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c2340"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="liquid-ind" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="glow-ind" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- BG -->
  <rect width="480" height="320" fill="url(#bg-ind)" rx="20"/>
  <!-- Grid -->
  <path d="M0 40h480M0 80h480M0 120h480M0 160h480M0 200h480M0 240h480M0 280h480M40 0v320M80 0v320M120 0v320M160 0v320M200 0v320M240 0v320M280 0v320M320 0v320M360 0v320M400 0v320M440 0v320" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Glow behind flask -->
  <ellipse cx="240" cy="210" rx="100" ry="60" fill="url(#glow-ind)"/>
  <!-- Flask neck -->
  <rect x="215" y="55" width="50" height="90" rx="6" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Flask body -->
  <path d="M215 145 L148 265 Q148 278 165 278 L315 278 Q332 278 332 265 L265 145 Z" fill="rgba(96,165,250,0.08)" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Liquid fill -->
  <path d="M158 230 L152 265 Q152 275 168 275 L312 275 Q328 275 328 265 L322 230 Q240 210 158 230Z" fill="url(#liquid-ind)"/>
  <!-- Bubbles in liquid -->
  <circle cx="190" cy="255" r="5" fill="#93c5fd" opacity="0.6"/>
  <circle cx="240" cy="248" r="7" fill="#93c5fd" opacity="0.45"/>
  <circle cx="280" cy="260" r="4" fill="#93c5fd" opacity="0.55"/>
  <circle cx="218" cy="240" r="6" fill="#bfdbfe" opacity="0.35"/>
  <circle cx="264" cy="244" r="3.5" fill="#93c5fd" opacity="0.5"/>
  <!-- Rising bubbles in neck -->
  <circle cx="232" cy="185" r="3" fill="#60a5fa" opacity="0.4"/>
  <circle cx="248" cy="165" r="4" fill="#60a5fa" opacity="0.3"/>
  <circle cx="238" cy="140" r="2.5" fill="#60a5fa" opacity="0.35"/>
  <!-- Stopper -->
  <rect x="210" y="47" width="60" height="16" rx="5" fill="#60a5fa" opacity="0.75"/>
  <rect x="220" y="44" width="40" height="8" rx="3" fill="#93c5fd" opacity="0.6"/>
  <!-- Molecular structure top-right -->
  <circle cx="380" cy="75" r="10" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.55"/>
  <circle cx="415" cy="52" r="7" fill="#60a5fa" opacity="0.25"/>
  <circle cx="430" cy="90" r="6" fill="#60a5fa" opacity="0.2"/>
  <circle cx="405" cy="115" r="5" fill="#60a5fa" opacity="0.18"/>
  <line x1="380" y1="75" x2="415" y2="52" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="415" y1="52" x2="430" y2="90" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="430" y1="90" x2="405" y2="115" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="405" y1="115" x2="380" y2="75" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="395" cy="83" r="4" fill="#60a5fa" opacity="0.15"/>
  <!-- Bottom left molecule -->
  <circle cx="72" cy="215" r="9" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.45"/>
  <circle cx="52" cy="245" r="6" fill="#60a5fa" opacity="0.2"/>
  <circle cx="95" cy="248" r="5" fill="#60a5fa" opacity="0.18"/>
  <line x1="72" y1="215" x2="52" y2="245" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.3"/>
  <line x1="72" y1="215" x2="95" y2="248" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.3"/>
  <!-- Label -->
  <rect x="150" y="285" width="180" height="26" rx="8" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
  <text x="240" y="302" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#93c5fd" font-weight="700" letter-spacing="0.5">H₂SO₄ · 98% PURE</text>
  <!-- Top badge -->
  <rect x="20" y="20" width="90" height="24" rx="6" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
  <text x="65" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#93c5fd" font-weight="600">INDUSTRIAL</text>
</svg>
