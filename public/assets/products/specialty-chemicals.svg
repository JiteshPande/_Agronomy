  <path d="M155 60 L185 115 L125 115 Z" fill="rgba(192,132,252,0.15)" stroke="#c084fc" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="148" y="52" width="14" height="12" rx="2" fill="rgba(192,132,252,0.2)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5"/>
