  <rect x="20" y="20" width="80" height="24" rx="6" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.4"/>
  <text x="60" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#c084fc" font-weight="600">PRECISION</text>
