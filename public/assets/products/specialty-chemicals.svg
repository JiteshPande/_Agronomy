<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="bg-sp" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a20"/>
      <stop offset="100%" stop-color="#2d1245"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glow-sp" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="320" fill="url(#bg-sp)" rx="20"/>
  <path d="M0 40h480M0 80h480M0 120h480M0 160h480M0 200h480M0 240h480M0 280h480M40 0v320M80 0v320M120 0v320M160 0v320M200 0v320M240 0v320M280 0v320M320 0v320M360 0v320M400 0v320M440 0v320" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <ellipse cx="240" cy="180" rx="100" ry="65" fill="url(#glow-sp)"/>
