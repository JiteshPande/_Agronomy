  <line x1="72" y1="90" x2="95" y2="65" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.3"/>
  <line x1="72" y1="90" x2="48" y2="112" stroke="#a855f7" stroke-width="1.2" stroke-opacity="0.3"/>
