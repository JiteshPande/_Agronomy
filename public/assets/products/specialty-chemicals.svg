  <circle cx="400" cy="90" r="7" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.45"/>
  <circle cx="425" cy="70" r="5" fill="#a855f7" opacity="0.18"/>
  <circle cx="428" cy="112" r="4.5" fill="#c084fc" opacity="0.16"/>
