  <path d="M200 205 C198 220 193 240 185 260 M200 205 C202 222 204 242 210 262 M200 205 C196 222 188 238 178 258" stroke="#8B5e3c" stroke-width="1" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M300 205 C299 220 295 242 290 262 M300 205 C302 222 308 240 315 262 M300 205 C296 222 288 242 280 260" stroke="#8B5e3c" stroke-width="1" stroke-linecap="round" stroke-opacity="0.45"/>
  <!-- Layer labels -->
  <text x="85" y="185" font-family="system-ui,sans-serif" font-size="9" fill="#d4a76a" font-weight="600" opacity="0.75">Humus Layer · K⁺ Enriched</text>
  <text x="85" y="232" font-family="system-ui,sans-serif" font-size="9" fill="#a07040" font-weight="500" opacity="0.65">Subsoil · Mineral Exchange Zone</text>
  <text x="85" y="283" font-family="system-ui,sans-serif" font-size="9" fill="#7a5030" font-weight="500" opacity="0.55">Parent Material</text>
