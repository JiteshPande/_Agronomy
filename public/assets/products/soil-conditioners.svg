  <circle cx="162" cy="225" r="4" fill="#48A111" opacity="0.35"/>
  <circle cx="230" cy="218" r="3.5" fill="#48A111" opacity="0.3"/>
  <circle cx="310" cy="230" r="4" fill="#48A111" opacity="0.32"/>
  <circle cx="365" cy="220" r="3" fill="#48A111" opacity="0.28"/>
  <!-- Plants above soil -->
  <path d="M200 155 L200 80" stroke="#48A111" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M200 110 C185 95 175 80 180 65 C190 55 205 70 200 80" fill="#48A111" fill-opacity="0.4" stroke="#48A111" stroke-width="1.2" stroke-opacity="0.6"/>
  <path d="M200 125 C215 110 228 100 228 85 C222 72 208 80 200 90" fill="#6bce2a" fill-opacity="0.3" stroke="#6bce2a" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M300 155 L300 90" stroke="#48A111" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M300 115 C286 100 278 87 282 72 C290 62 305 74 300 85" fill="#48A111" fill-opacity="0.35" stroke="#48A111" stroke-width="1" stroke-opacity="0.55"/>
  <!-- Label -->
  <rect x="145" y="30" width="190" height="26" rx="8" fill="rgba(72,161,17,0.1)" stroke="#48A111" stroke-width="1" stroke-opacity="0.4"/>
  <text x="240" y="47" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#6bce2a" font-weight="700" letter-spacing="0.5">SOIL CONDITIONERS</text>
