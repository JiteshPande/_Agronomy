<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="bg-sc" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0f05"/>
      <stop offset="100%" stop-color="#2d1a08"/>
    </linearGradient>
    <linearGradient id="soil1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d2b10"/>
      <stop offset="100%" stop-color="#1a0f05"/>
    </linearGradient>
    <linearGradient id="soil2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5c3d1e"/>
      <stop offset="100%" stop-color="#3d2b10"/>
    </linearGradient>
    <linearGradient id="topsoil" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c5130"/>
      <stop offset="100%" stop-color="#5c3d1e"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="url(#bg-sc)" rx="20"/>
  <path d="M0 40h480M0 80h480M0 120h480M0 160h480M0 200h480M0 240h480M0 280h480M40 0v320M80 0v320M120 0v320M160 0v320M200 0v320M240 0v320M280 0v320M320 0v320M360 0v320M400 0v320M440 0v320" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Soil cross-section layers -->
  <!-- Layer 1 - organic/humus -->
  <rect x="60" y="155" width="360" height="50" fill="url(#topsoil)" rx="4" opacity="0.9"/>
  <!-- Layer 2 - subsoil -->
  <rect x="60" y="205" width="360" height="55" fill="url(#soil2)" opacity="0.85"/>
  <!-- Layer 3 - deep soil -->
  <rect x="60" y="260" width="360" height="45" fill="url(#soil1)" opacity="0.8"/>
  <!-- Potassium Humate granules on top layer -->
  <circle cx="110" cy="170" r="8" fill="#1a0a02" stroke="#8B5e3c" stroke-width="1.5"/>
  <circle cx="142" cy="163" r="6" fill="#1a0a02" stroke="#6b4828" stroke-width="1.2"/>
  <circle cx="175" cy="172" r="7" fill="#1a0a02" stroke="#7c5130" stroke-width="1.3"/>
  <circle cx="205" cy="160" r="5" fill="#1a0a02" stroke="#5c3d1e" stroke-width="1.2"/>
  <circle cx="235" cy="168" r="9" fill="#1a0a02" stroke="#8B5e3c" stroke-width="1.5"/>
  <circle cx="268" cy="162" r="6" fill="#1a0a02" stroke="#6b4828" stroke-width="1.2"/>
  <circle cx="298" cy="170" r="7" fill="#1a0a02" stroke="#7c5130" stroke-width="1.3"/>
  <circle cx="330" cy="165" r="5.5" fill="#1a0a02" stroke="#5c3d1e" stroke-width="1.2"/>
  <circle cx="360" cy="172" r="8" fill="#1a0a02" stroke="#8B5e3c" stroke-width="1.5"/>
  <circle cx="128" cy="182" r="5" fill="#1a0a02" stroke="#6b4828" stroke-width="1.1"/>
  <circle cx="248" cy="180" r="6" fill="#1a0a02" stroke="#7c5130" stroke-width="1.2"/>
  <circle cx="380" cy="165" r="6" fill="#1a0a02" stroke="#6b4828" stroke-width="1.2"/>
  <!-- Humate granule label highlight -->
  <circle cx="235" cy="168" r="9" fill="rgba(72,161,17,0.15)" stroke="#48A111" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Root systems -->
  <path d="M200 155 C200 145 195 130 185 110 M200 155 C205 140 208 120 215 100 M200 155 C198 140 190 125 180 108" stroke="#48A111" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M300 155 C300 140 295 125 288 105 M300 155 C305 142 310 122 318 102 M300 155 C298 140 290 120 282 100" stroke="#48A111" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.5"/>
